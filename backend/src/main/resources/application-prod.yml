app:
    http:
        cache:
            public:
                max-age-seconds: 300
    security:
        cors:
            allowed-origins: https://tormap.org,https://www.tormap.org
springdoc:
    api-docs:
        enabled: false
    swagger-ui:
        enabled: false
spring:
    datasource:
        # Required in production environment
        password: ${SPRING_DATASOURCE_PASSWORD}
