# Example Docker compose file for production deployment
name: tormap
services:
    backend:
        image: tormap/backend:${TORMAP_VERSION:-3}
        volumes:
            - ./tormap-data:/tormap-data
        depends_on:
            - database
        environment:
            - SPRING_DATASOURCE_URL=jdbc:postgresql://database:5432/postgres
            - SPRING_DATASOURCE_USERNAME=postgres
            - SPRING_DATASOURCE_PASSWORD=${TORMAP_DATABASE_PASSWORD:?Set TORMAP_DATABASE_PASSWORD to a strong generated password}
            # Optional: enable New Relic monitoring by providing the license key as an environment variable
            # - NEW_RELIC_INGEST_KEY=${NEW_RELIC_INGEST_KEY:?Set NEW_RELIC_INGEST_KEY to your New Relic license key to enable monitoring}
            # Optional: enable actuator admin access
            # - TORMAP_ADMIN_PASSWORD=${TORMAP_ADMIN_PASSWORD:?Set TORMAP_ADMIN_PASSWORD to a strong generated password}
            # and explicitly enable/ expose the actuator endpoints you need via management.* properties
        ports:
            - "8080:8080"

    database:
        image: postgres:18-alpine@sha256:1b1689b20d16a014a3d195653381cf2caa75a41a92d93b255a9d6ea29fd353aa
        environment:
            - POSTGRES_USER=postgres
            - POSTGRES_PASSWORD=${TORMAP_DATABASE_PASSWORD:?Set TORMAP_DATABASE_PASSWORD to a strong generated password}
        ports:
            - "5432:5432"

    frontend:
        image: tormap/frontend:${TORMAP_VERSION:-3}
        ports:
            - "80:80"
