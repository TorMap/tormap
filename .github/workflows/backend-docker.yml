name: backend_docker

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'

jobs:
  backend_docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 11
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '11'
          distribution: 'adopt'

      - uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Build and push docker image
        # On v* tag → semver + :latest. On non-tag push → :edge only.
        run: |
          cd backend
          if [[ "${{ github.ref_type }}" = "tag" ]]; then
            ./gradlew jib # tags come from build.gradle.kts
          elif [[ "${{ github.ref_type }}" = "branch" && "${{ github.ref_name }}" = "master" ]]; then
            ./gradlew jib -Djib.to.image=tormap/backend:edge
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
