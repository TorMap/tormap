name: backend_docker

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'

jobs:
  backend_docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up JDK 11
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '11'
          distribution: 'adopt'

      - uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3
      - uses: gradle/actions/wrapper-validation@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6

      - name: Login to DockerHub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # On master push → :edge only
      - name: Build and push docker edge image
        if: github.ref_type == 'branch' && github.ref_name == 'master'
        run: cd backend && ./gradlew jib -Djib.to.tags=edge

      # On v* tag → semver + latest
      - name: Build and push docker release image
        if: github.ref_type == 'tag'
        run: cd backend && ./gradlew jib # see backend/build.gradle.kts for jib config
