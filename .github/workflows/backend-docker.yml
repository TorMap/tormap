name: backend_docker

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
    paths:
      - 'backend/**'
      - '.github/workflows/backend-docker.yml'

jobs:
  backend_docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Set up JDK 11
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5
        with:
          java-version: '11'
          distribution: 'adopt'

      - uses: gradle/gradle-build-action@ac2d340dc04d9e1113182899e983b5400c17cda1 # v3
      - uses: gradle/actions/wrapper-validation@3f131e8634966bd73d06cc69884922b02e6faf92 # v6

      - name: Build and push docker image
        # On v* tag → semver + :latest. On non-tag push → :edge only.
        run: |
          cd backend
          if [[ "${{ github.ref_type }}" = "tag" ]]; then
            ./gradlew jib # tags come from build.gradle.kts
          elif [[ "${{ github.ref_type }}" = "branch" && "${{ github.ref_name }}" = "master" ]]; then
            ./gradlew jib -Djib.to.image=tormap/backend:edge -Djib.to.tags=edge
          fi
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
