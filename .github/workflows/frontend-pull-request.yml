name: Frontend Pull Request

on:
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend_build:
    uses: ./.github/workflows/frontend-build.yml

  frontend_build_deploy:
    runs-on: ubuntu-latest
    needs: frontend_build
    permissions:
      contents: read
      deployments: write
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Download frontend build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: frontend-build
          path: frontend/build

      - name: Deploy to preview channel
        if: github.event.pull_request.base.ref == 'master' || github.event.pull_request.base.ref == 'dev'
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c # v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_TORMAP_36F44 }}'
          projectId: tormap-36f44
          entryPoint: ./frontend
          expires: 30d
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
